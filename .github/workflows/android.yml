name: Android CI
on:
  push:
    branches: [ "master" ]
  workflow_dispatch: # This lets you start it manually if needed

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Expo usually needs JDK 17, not 11
          distribution: 'temurin'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Generate Android Folder
        # This creates the 'gradlew' file that was missing
        run: npx expo prebuild --platform android

      - name: Build AAB
        # This command builds the actual file for Google Play
        run: npx eas-cli build --platform android --local --non-interactive --output=./app-release.aab

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: ./app-release.aab
